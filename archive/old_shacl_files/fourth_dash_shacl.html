<!DOCTYPE html>
<html>
<head>
    <title>SHACL Browser Form</title>
    <!-- Load PyScript assets -->
    <link rel="stylesheet" href="https://pyscript.net" />
    <script type="module" src="https://pyscript.net"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; background-color: #f4f4f9;">

    <h2>SHACL Browser Form (Powered by PyScript)</h2>
    <div id="form-container" style="background: white; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <p>Loading Python environment...</p>
    </div>
    <button id="submit-btn" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">Submit Data</button>

    <script type="py" config='{"packages": ["rdflib"]}'>
        from pyscript import document
        from rdflib import Graph, Namespace, RDF, SH

        # 1. SHACL Schema
        shacl_data = """
        @prefix sh: <http://w3.org> .
        @prefix ex: <http://example.org> .
        @prefix dash: <http://datashapes.org> .
        ex:PersonShape a sh:NodeShape ;
            sh:property [ sh:path ex:fullName ; sh:name "Full Name" ] ;
            sh:property [ sh:path ex:bio ; sh:name "Biography" ; dash:editor dash:TextAreaEditor ] .
        """

        # 2. Setup Graph and Namespaces
        SH_NS = Namespace("http://w3.org")
        DASH = Namespace("http://datashapes.org")
        g = Graph().parse(data=shacl_data, format="turtle")

        container = document.querySelector("#form-container")
        container.innerHTML = "" # Clear loading message
        fields = {}

        # 3. Generate HTML inputs from SHACL
        for shape in g.subjects(RDF.type, SH_NS.NodeShape):
            for prop in g.objects(shape, SH_NS.property):
                name = str(g.value(prop, SH_NS.name))
                editor = g.value(prop, DASH.editor)

                # Create Label
                label = document.createElement("label")
                label.innerText = f"{name}:"
                label.style.display = "block"
                label.style.marginTop = "10px"
                label.style.fontWeight = "bold"
                container.appendChild(label)

                # Create Input based on DASH editor
                if editor == DASH.TextAreaEditor:
                    el = document.createElement("textarea")
                    el.style.height = "80px"
                else:
                    el = document.createElement("input")
                    el.type = "text"

                el.style.width = "100%"
                el.id = f"input-{name.replace(' ', '')}"
                container.appendChild(el)
                fields[name] = el

        # 4. Handle Submission
        def handle_click(event):
            output = "Data Collected:\\n"
            for name, el in fields.items():
                output += f"{name}: {el.value}\\n"
            print(output)
            js.alert(output)

        from pyodide.ffi import create_proxy
        import js

        submit_btn = document.querySelector("#submit-btn")
        submit_btn.addEventListener("click", create_proxy(handle_click))
    </script>
</body>
</html>
