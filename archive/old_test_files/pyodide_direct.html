<!DOCTYPE html>
<html>
<head>
    <title>Direct Pyodide Test</title>
</head>
<body style="font-family: sans-serif; padding: 20px; background-color: #f4f4f9;">

    <h2>SHACL Form (Direct Pyodide)</h2>
    <div id="form-container" style="background: white; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-height: 100px;">
        <p id="loading-msg">Loading Python environment...</p>
    </div>
    <button id="submit-btn" style="margin-top: 20px; padding: 10px 20px; cursor: pointer; display: none;">Submit Data</button>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script>
        async function main() {
            const loadingMsg = document.getElementById("loading-msg");
            const container = document.getElementById("form-container");
            const submitBtn = document.getElementById("submit-btn");
            
            try {
                loadingMsg.textContent = "Initializing Pyodide...";
                let pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
                });
                
                loadingMsg.textContent = "Installing RDFLib...";
                await pyodide.loadPackage("rdflib");
                
                loadingMsg.style.display = "none";
                
                // Run Python code
                await pyodide.runPython(`
                    import js
                    from pyodide.ffi import create_proxy
                    from rdflib import Graph, Namespace, RDF, SH

                    # SHACL Schema
                    shacl_data = """
                    @prefix sh: <http://www.w3.org/ns/shacl#> .
                    @prefix ex: <http://example.org/> .
                    @prefix dash: <http://datashapes.org/dash#> .
                    ex:PersonShape a sh:NodeShape ;
                        sh:property [ sh:path ex:fullName ; sh:name "Full Name" ] ;
                        sh:property [ sh:path ex:bio ; sh:name "Biography" ; dash:editor dash:TextAreaEditor ] .
                    """

                    # Setup
                    DASH = Namespace("http://datashapes.org/dash#")
                    g = Graph().parse(data=shacl_data, format="turtle")
                    container = js.document.getElementById("form-container")
                    fields = {}

                    # Build UI
                    for shape in g.subjects(RDF.type, SH.NodeShape):
                        for prop in g.objects(shape, SH.property):
                            name = str(g.value(prop, SH.name))
                            editor = g.value(prop, DASH.editor)

                            lbl = js.document.createElement("label")
                            lbl.innerText = f"{name}:"
                            lbl.style.display = "block"
                            lbl.style.marginTop = "10px"
                            container.appendChild(lbl)

                            if editor == DASH.TextAreaEditor:
                                el = js.document.createElement("textarea")
                            else:
                                el = js.document.createElement("input")

                            el.style.width = "95%"
                            container.appendChild(el)
                            fields[name] = el

                    # Show submit button
                    btn = js.document.getElementById("submit-btn")
                    btn.style.display = "block"

                    def handle_click(event):
                        out = "Submitted Data:\\n"
                        for n, e in fields.items():
                            out += f"{n}: {e.value}\\n"
                        js.alert(out)

                    btn.onclick = create_proxy(handle_click)
                `);
                
            } catch (error) {
                loadingMsg.style.display = "none";
                const errorMsg = document.createElement("p");
                errorMsg.textContent = "Error: " + error.message;
                errorMsg.style.color = "red";
                container.appendChild(errorMsg);
                console.error(error);
            }
        }
        
        main();
    </script>
</body>
</html>
